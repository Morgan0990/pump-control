<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление насосами</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0e27;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .status.online { background: rgba(0,255,100,0.2); color: #00ff64; }
        .status.offline { background: rgba(255,0,0,0.2); color: #ff4444; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .card .label { color: #888; font-size: 13px; margin-bottom: 8px; }
        .card .value { font-size: 20px; font-weight: bold; }
        .value.success { color: #00ff64; }
        .value.danger { color: #ff4444; }
        .value.warning { color: #ffaa00; }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-weight: bold;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-success { background: #00c853; color: #fff; }
        .btn-danger { background: #d50000; color: #fff; }
        .btn-warning { background: #ff6d00; color: #fff; }
        .btn-primary { background: #2979ff; color: #fff; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .history {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }
        .history-item .time { color: #888; }
        .history-item .cmd { color: #00d4ff; }
        .history-item .info { color: #aaa; }
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr 1fr; }
            .controls { grid-template-columns: 1fr 1fr; }
            .header { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">💧 Pump Control</div>
            <div class="status offline" id="status">Подключение...</div>
        </div>
        
        <div class="grid" id="statusGrid">
            <div class="card">
                <div class="label">⚡ Питание</div>
                <div class="value" id="voltage">—</div>
            </div>
            <div class="card">
                <div class="label">🌡️ Температура</div>
                <div class="value" id="temp">—</div>
            </div>
            <div class="card">
                <div class="label">💧 Поток</div>
                <div class="value" id="flow">—</div>
            </div>
            <div class="card">
                <div class="label">🔴 Насос 1</div>
                <div class="value" id="pump1">—</div>
            </div>
            <div class="card">
                <div class="label">🔵 Насос 2</div>
                <div class="value" id="pump2">—</div>
            </div>
        </div>
        
        <h2 style="margin: 20px 0 10px;">🎮 Управление</h2>
        <div class="controls">
            <button class="btn btn-success" onclick="sendCommand('pump1_on')">▶ Pump1 ВКЛ</button>
            <button class="btn btn-danger" onclick="sendCommand('pump1_off')">⏹ Pump1 ВЫКЛ</button>
            <button class="btn btn-success" onclick="sendCommand('pump2_on')">▶ Pump2 ВКЛ</button>
            <button class="btn btn-danger" onclick="sendCommand('pump2_off')">⏹ Pump2 ВЫКЛ</button>
            <button class="btn btn-warning" onclick="sendCommand('reset_pump1')">↩ Вернуть Pump1</button>
            <button class="btn btn-primary" onclick="sendCommand('status')">📊 Статус</button>
        </div>
        
        <div class="history">
            <h3 style="margin-bottom: 10px;">📋 История</h3>
            <div id="events">
                <div class="history-item"><span class="info">⏳ Ожидание данных...</span></div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        // Автоматически определяем адрес сервера
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const SERVER = protocol + window.location.host;
        
        function connect() {
            try {
                ws = new WebSocket(SERVER);
                ws.onopen = () => {
                    document.getElementById('status').className = 'status online';
                    document.getElementById('status').textContent = '✅ Подключено';
                    addEvent('🚀 Соединение установлено');
                };
                ws.onmessage = (e) => {
                    try {
                        const data = JSON.parse(e.data);
                        updateUI(data);
                    } catch(err) {}
                };
                ws.onclose = () => {
                    document.getElementById('status').className = 'status offline';
                    document.getElementById('status').textContent = '❌ Отключено';
                    setTimeout(connect, 5000);
                };
                ws.onerror = () => {
                    document.getElementById('status').className = 'status offline';
                    document.getElementById('status').textContent = '⚠️ Ошибка';
                };
            } catch(e) {
                setTimeout(connect, 5000);
            }
        }
        
        function updateUI(data) {
            // Питание
            if (data.voltagePresent !== undefined) {
                const el = document.getElementById('voltage');
                el.textContent = data.voltagePresent ? '✅ Есть' : '❌ Нет';
                el.className = 'value ' + (data.voltagePresent ? 'success' : 'danger');
            }
            // Температура
            if (data.temperature !== undefined) {
                const el = document.getElementById('temp');
                el.textContent = data.temperature.toFixed(1) + '°C';
                const cls = data.temperature < 30 ? 'success' : data.temperature < 40 ? 'warning' : 'danger';
                el.className = 'value ' + cls;
            }
            // Поток
            if (data.flowPresent !== undefined) {
                const el = document.getElementById('flow');
                el.textContent = data.flowPresent ? '✅ Есть' : '❌ Нет';
                el.className = 'value ' + (data.flowPresent ? 'success' : 'danger');
            }
            // Насос 1
            if (data.pump1Active !== undefined) {
                const el = document.getElementById('pump1');
                el.textContent = data.pump1Active ? '🟢 ВКЛ' : '🔴 ВЫКЛ';
                el.className = 'value ' + (data.pump1Active ? 'success' : 'danger');
            }
            // Насос 2
            if (data.pump2Active !== undefined) {
                const el = document.getElementById('pump2');
                el.textContent = data.pump2Active ? '🟢 ВКЛ' : '🔴 ВЫКЛ';
                el.className = 'value ' + (data.pump2Active ? 'success' : 'danger');
            }
            // Добавляем в историю
            let msg = '📊 Статус обновлён';
            if (data.pump1Active !== undefined && data.pump2Active !== undefined) {
                msg = `🔄 Pump1 ${data.pump1Active ? 'ВКЛ' : 'ВЫКЛ'}, Pump2 ${data.pump2Active ? 'ВКЛ' : 'ВЫКЛ'}`;
            } else if (data.temperature !== undefined) {
                msg = `🌡️ Температура: ${data.temperature.toFixed(1)}°C`;
            } else if (data.flowPresent !== undefined) {
                msg = `💧 Поток: ${data.flowPresent ? 'ЕСТЬ' : 'НЕТ'}`;
            }
            addEvent(msg);
        }
        
        function addEvent(text) {
            const events = document.getElementById('events');
            const time = new Date().toLocaleTimeString();
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<span class="time">${time}</span><span class="info">${text}</span>`;
            events.insertBefore(item, events.firstChild);
            while (events.children.length > 30) events.removeChild(events.lastChild);
        }
        
        function sendCommand(cmd) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                alert('❌ Нет соединения с сервером!');
                return;
            }
            ws.send(JSON.stringify({ command: cmd }));
            const names = {
                'pump1_on': '▶ Включен Pump1',
                'pump1_off': '⏹ Выключен Pump1',
                'pump2_on': '▶ Включен Pump2',
                'pump2_off': '⏹ Выключен Pump2',
                'reset_pump1': '↩ Возврат на Pump1',
                'status': '📊 Запрос статуса'
            };
            addEvent('👤 ' + (names[cmd] || cmd));
        }
        
        // Запуск
        connect();
    </script>
</body>
</html>
